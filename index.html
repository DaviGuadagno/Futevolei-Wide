<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team L7 · Gestão Financeira</title>
<link id="favicon" rel="icon" type="image/jpeg" />

<!-- Firebase (compat: expõe o global `firebase`, ideal sem build) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- React + Babel (sem build) -->

<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0c0c0f; --panel:#16161b; --panel2:#101013; --border:#2a2a31;
  --txt:#ededf0; --muted:#9a9aa6; --accent:#e11d2a; --good:#34d399; --bad:#ff6b7d; --info:#9aa0aa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'Manrope',system-ui,sans-serif}
h1,h2,h3,.display{font-family:'Bricolage Grotesque',system-ui,sans-serif}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#2a3850;border-radius:8px}
.app{display:flex;min-height:100vh}
.side{width:240px;flex-shrink:0;background:var(--panel2);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:12px;padding:6px;margin-bottom:24px}
.logo{width:40px;height:40px;border-radius:12px;background:var(--accent);color:#0b0f17;display:flex;align-items:center;justify-content:center}
.nav{flex:1;display:flex;flex-direction:column;gap:4px}
.navbtn{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;border:none;background:none;color:var(--muted);font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-align:left;width:100%}
.navbtn:hover{background:#1a2333;color:var(--txt)}
.navbtn.active{background:var(--accent);color:#0b0f17}
.main{flex:1;overflow-x:hidden}
.wrap{padding:28px}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:8px}
.head h1{font-size:26px;font-weight:800}
.head p{color:var(--muted);font-size:13px;margin-top:2px}
.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.stat-v{font-size:24px;font-weight:800;margin-top:8px}
.stat-s{font-size:12px;color:var(--muted);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--txt);font:inherit;font-weight:600;font-size:14px;cursor:pointer}
.btn:hover{background:#1a2333}
.btn-accent{background:var(--accent);color:#0b0f17;border-color:var(--accent)}
.btn-accent:hover{background:#f23643}
.input,select.input{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:#0f1521;color:var(--txt);font:inherit;font-size:14px;outline:none}
.input:focus{border-color:var(--accent)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;background:var(--panel2)}
tbody td{padding:12px 14px;border-top:1px solid var(--border)}
tbody tr:hover{background:#161f2e}
.badge{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;text-transform:capitalize}
.b-ativo{background:rgba(52,211,153,.15);color:var(--good)}
.b-inadimplente{background:rgba(251,113,133,.15);color:var(--bad)}
.b-cancelado{background:rgba(148,163,184,.18);color:var(--muted)}
.b-emdia{background:rgba(52,211,153,.15);color:var(--good)}
.b-aberto{background:rgba(245,200,66,.16);color:#f5c842}
.b-efetivada{background:rgba(52,211,153,.15);color:var(--good)}
.b-entrada{background:rgba(52,211,153,.15);color:var(--good)}
.b-saida{background:rgba(251,113,133,.15);color:var(--bad)}
.icobtn{padding:6px;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer}
.icobtn:hover{background:#26334a;color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:480px}
.legend{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);justify-content:space-between;margin-top:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.row{display:flex;align-items:center;gap:8px}
.topnav{display:none;gap:6px;overflow-x:auto;padding:10px;border-bottom:1px solid var(--border)}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
@media(max-width:880px){
  .side{display:none}.topnav{display:flex}.wrap{padding:16px}
  .cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}
  .cols-2{grid-template-columns:1fr}.head h1{font-size:22px}
}
@media print{.side,.topnav,.btn,.icobtn,.no-print{display:none!important}.main{overflow:visible}}
</style>
</head>

/* Hook: coleção Firestore em tempo real */
function useCol(name){
  const [rows,setRows] = useState([]);
  useEffect(()=>{
    const unsub = db.collection(name).onSnapshot(
      snap => setRows(snap.docs.map(d=>({id:d.id,...d.data()}))),
      err => console.error(name,err)
    );
    return unsub;
  },[name]);
  return rows;
}

const put = (c,id,data)=>db.collection(c).doc(id).set(data,{merge:true});
const del = (c,id)=>db.collection(c).doc(id).delete();

/* ============================ Gráficos SVG ============================ */
function Donut({data}){
  const total = data.reduce((a,d)=>a+d.value,0)||1;
  let acc=0; const R=54,C=2*Math.PI*R;
  return (<svg viewBox="0 0 140 140" width="100%" height="180">
    <g transform="translate(70,70) rotate(-90)">
      {data.map((d,i)=>{ const len=d.value/total*C; const seg=(<circle key={i} r={R} fill="none"
        stroke={d.color} strokeWidth="18" strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-acc}/>);
        acc+=len; return seg; })}
    </g>
  </svg>);
}
function Bars({data,height=210}){
  const max = Math.max(...data.map(d=>d.value),1); const W=Math.max(data.length*70,140);
  return (<svg viewBox={`0 0 ${W} ${height}`} width="100%" height={height} preserveAspectRatio="none">
    {data.map((d,i)=>{ const h=(d.value/max)*(height-40); const x=i*(W/data.length)+ (W/data.length)*0.25; const w=(W/data.length)*0.5;
      return (<g key={i}>
        <rect x={x} y={height-30-h} width={w} height={h} rx="6" fill={d.color}/>
        <text x={x+w/2} y={height-12} fill="var(--muted)" fontSize="11" textAnchor="middle" fontFamily="Manrope">{d.label}</text>
        <text x={x+w/2} y={height-36-h} fill="var(--txt)" fontSize="12" textAnchor="middle" fontFamily="Manrope" fontWeight="700">{d.value}</text>
      </g>); })}
  </svg>);
}
function Lines({series,labels,height=240}){
  const all = series.flatMap(s=>s.points); const max=Math.max(...all,1), min=Math.min(...all,0);
  const W=560,H=height,pad=36; const n=labels.length;
  const X=i=> pad + i*((W-pad*2)/Math.max(n-1,1));
  const Y=v=> H-30 - ((v-min)/((max-min)||1))*(H-60);
  return (<svg viewBox={`0 0 ${W} ${H}`} width="100%" height={height}>
    {[0,.5,1].map((t,i)=>{const y=30+t*(H-60);return <line key={i} x1={pad} x2={W-pad} y1={y} y2={y} stroke="var(--border)"/>;})}
    {series.map((s,si)=>(<polyline key={si} fill="none" stroke={s.color} strokeWidth="2.5"
      points={s.points.map((v,i)=>`${X(i)},${Y(v)}`).join(" ")}/>))}
    {labels.map((l,i)=>(<text key={i} x={X(i)} y={H-8} fill="var(--muted)" fontSize="11" textAnchor="middle" fontFamily="Manrope">{l}</text>))}
  </svg>);
}

/* ============================ Páginas ============================ */
function Dashboard({students,plans,gympass,checkins,tx}){
  const planById=id=>plans.find(p=>p.id===id);
  const active=students.filter(s=>payStatus(s)!=="cancelado");
  const inad=students.filter(s=>payStatus(s)==="inadimplente");
  const aberto=students.filter(s=>payStatus(s)==="em aberto");
  const mrrA=active.reduce((a,s)=>a+(planById(s.planId)?.price||0),0);
  const tmGym=checkins.filter(c=>(c.date||"").startsWith(ym(today)));
  const gym=tmGym.reduce((a,c)=>a+(c.value||0),0);
  const gymCount=tmGym.length;
  const mrr=mrrA;
  const inadV=inad.reduce((a,s)=>a+(planById(s.planId)?.price||0),0);
  const tm=ym(today);
  const desp=tx.filter(t=>t.type==="saida"&&(t.date||"").startsWith(tm)).reduce((a,t)=>a+t.amount,0);
  const tmTx=tx.filter(t=>(t.date||"").startsWith(tm));
  const caixaEnt=tmTx.filter(t=>t.type==="entrada"&&(t.situacao||"efetivada")==="efetivada").reduce((a,t)=>a+t.amount,0);
  const caixaSai=tmTx.filter(t=>t.type==="saida"&&(t.situacao||"efetivada")==="efetivada").reduce((a,t)=>a+t.amount,0);
  const caixa=caixaEnt+gym-caixaSai;
  const byPlan=plans.map((p,i)=>({label:p.name,value:active.filter(s=>s.planId===p.id).length,
    receita:active.filter(s=>s.planId===p.id).length*p.price,color:PALETTE[i%5]}));

  const monthly=useMemo(()=>{const m={};tx.forEach(t=>{const k=(t.date||"").slice(0,7);if(!k)return;m[k]=m[k]||{e:0,s:0};m[k][t.type==="entrada"?"e":"s"]+=t.amount;});
    const ks=Object.keys(m).sort();return ks.map(k=>({mes:MS[+k.split("-")[1]-1],e:m[k].e,s:m[k].s,l:m[k].e-m[k].s}));},[tx]);
  const grow=monthly.length>=2&&monthly.at(-2).e? ((monthly.at(-1).e-monthly.at(-2).e)/monthly.at(-2).e*100):0;

  return (<div className="grid" style={{gap:16}}>
    <div className="grid cols-3">
      <Stat icon={IC.users} label="Alunos ativos" value={active.length} sub={`${students.length} cadastrados`}/>
      <Stat icon={IC.wallet} label="Mensalidades" value={fmt(mrr)} sub="Receita fixa (planos)" tone="accent"/>
      <Stat icon={IC.act} label="Gympass" value={fmt(gym)} sub={`${gymCount} check-ins · receita variável`}/>
      <Stat icon={IC.warn} label="Inadimplência" value={fmt(inadV)} sub={`${inad.length} em atraso · ${aberto.length} em aberto`} tone="bad"/>
      <Stat icon={IC.wallet} label="Caixa do mês" value={fmt(caixa)} sub={`Efetivado: entradas + gympass − saídas`} tone={caixa>=0?"good":"bad"}/>
      <Stat icon={IC.up} label="Resultado estimado" value={fmt(mrr+gym-desp)} sub={`Receitas ${fmt(mrr+gym)} − Despesas ${fmt(desp)}`} tone={mrr+gym-desp>=0?"good":"bad"}/>
    </div>
    <div className="grid cols-2">
      <div className="card">
        <div className="row" style={{justifyContent:"space-between",marginBottom:6}}>
          <h3>Receita × Despesa</h3>
          <span style={{fontSize:12,color:grow>=0?"var(--good)":"var(--bad)"}} className="row">
            <I d={grow>=0?IC.up:IC.down} size={14}/>{grow.toFixed(1)}%</span>
        </div>
        <Lines labels={monthly.map(m=>m.mes)} series={[

function Gympass({gympass,checkins,canEdit}){
  const [modal,setModal]=useState(null);        // registrar check-in

  const [mode,setMode]=useState("mes");         // "dia" ou "mes"

  const [mes,setMes]=useState(ym(today));
  const [report,setReport]=useState(null);      // null = nada gerado ainda
  const blankCheckin={name:gympass[0]?.name||"",date:ym(today)+"-"+String(today.getDate()).padStart(2,"0"),value:13.85};
  const saveCheckin=c=>{add("checkins",c);setModal(null);};
  const saveRoster=r=>{add("gympass",{name:r.name});setRosterModal(null);};

  const gerar=()=>{
    const prefix = mode==="dia" ? day : mes;
    const list=checkins.filter(c=>(c.date||"").startsWith(prefix)).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    const total=list.reduce((a,c)=>a+(c.value||0),0);

    if(!report) return;
    const rows=[["Data","Aluno","Valor"],...report.list.map(c=>[c.date,c.name,c.value])];
    const blob=new Blob(["\ufeff"+rows.map(r=>r.join(";")).join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`gympass_${report.prefix}.csv`;a.click();

        {mode==="dia"

  const onSave=t=>{const{id,...d}=t;(id?put("transactions",id,d):add("transactions",d));setModal(null);};
  const csv=()=>{const rows=[["Data","Tipo","Categoria","Recorrência","Situação","Valor"],...list.map(t=>[t.date,t.type,t.cat,t.type==="saida"?(t.recur||""):"",t.situacao||"efetivada",t.amount])];
    const blob=new Blob(["\ufeff"+rows.map(r=>r.join(";")).join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`financeiro_${per}.csv`;a.click();};
  return (<div className="grid" style={{gap:14}}>
    <div className="grid cols-3">
      <Stat icon={IC.up} label="Entradas" value={fmt(ent)} tone="good"/>
      <Stat icon={IC.down} label="Saídas" value={fmt(sai)} sub={`Fixas ${fmt(saiFixo)} · Variáveis ${fmt(saiVar)}`} tone="bad"/>
      <Stat icon={IC.wallet} label="Fluxo de caixa" value={fmt(ent-sai)} tone={ent-sai>=0?"accent":"bad"}/>
    </div>
    <div className="row" style={{flexWrap:"wrap",gap:10}}>
      <select className="input" style={{width:"auto"}} value={per} onChange={e=>setPer(e.target.value)}>
        <option value="todos">Todos os períodos</option>
        {periods.map(p=>{const[y,m]=p.split("-");return <option key={p} value={p}>{MS[+m-1]}/{y}</option>;})}
      </select>
      <button className="btn" onClick={csv}><I d={IC.dl} size={16}/>Exportar CSV</button>
      <button className="btn" onClick={()=>window.print()}><I d={IC.print} size={16}/>PDF / Imprimir</button>
      {canEdit&&<button className="btn btn-accent" style={{marginLeft:"auto"}} onClick={()=>setModal(blank)}><I d={IC.plus} size={16}/>Lançamento</button>}
    </div>
    <div className="card" style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
      <thead><tr><th>Data</th><th>Categoria</th><th>Tipo</th><th style={{textAlign:"right"}}>Valor</th>{canEdit&&<th style={{textAlign:"right"}}>Ações</th>}</tr></thead>
      <tbody>{list.map(t=>(<tr key={t.id}>
        <td className="tnum" style={{color:"var(--muted)"}}>{fmtDate(t.date)}</td>
        <td style={{fontWeight:600}}>{t.cat}{t.type==="saida"&&t.recur&&<span className="badge" style={{marginLeft:8,fontSize:10,background:"var(--panel2)",color:"var(--muted)",border:"1px solid var(--border)"}}>{t.recur}</span>}{(t.situacao||"efetivada")==="aberto"&&<span className="badge b-aberto" style={{marginLeft:8,fontSize:10}}>em aberto</span>}</td>
        <td><Badge v={t.type}/></td>
        <td className="tnum" style={{textAlign:"right",fontWeight:700,color:t.type==="entrada"?"var(--good)":"var(--bad)"}}>{t.type==="entrada"?"+ ":"− "}{fmt(t.amount)}</td>
        {canEdit&&<td><div className="row" style={{justifyContent:"flex-end",gap:4}}>
          <button className="icobtn" onClick={()=>setModal(t)}><I d={IC.pen} size={15}/></button>
          <button className="icobtn" onClick={()=>del("transactions",t.id)}><I d={IC.trash} size={15}/></button></div></td>}
      </tr>))}</tbody></table></div></div>
    {modal&&<Modal title={modal.id?"Editar lançamento":"Novo lançamento"} onClose={()=>setModal(null)}>
      <TForm initial={modal} onSave={onSave} onClose={()=>setModal(null)}/></Modal>}
  </div>);
}
function TForm({initial,onSave,onClose}){
  const [f,setF]=useState(initial); const set=(k,v)=>setF({...f,[k]:v});
  return (<><div className="grid cols-2" style={{gap:12}}>
    <Field label="Tipo"><select className="input" value={f.type} onChange={e=>set("type",e.target.value)}>
      <option value="entrada">Entrada</option><option value="saida">Saída</option></select></Field>
    <Field label="Data"><input type="date" className="input" value={f.date} onChange={e=>set("date",e.target.value)}/></Field>
    <div style={{gridColumn:"span 2"}}><Field label="Categoria / descrição"><input className="input" value={f.cat} onChange={e=>set("cat",e.target.value)} placeholder="Ex.: Aluguel da quadra"/></Field></div>
    {f.type==="saida" && <div style={{gridColumn:"span 2"}}><Field label="Tipo de despesa">
      <select className="input" value={f.recur||"variavel"} onChange={e=>set("recur",e.target.value)}>
        <option value="fixo">Fixa (ex.: salários, aluguel)</option>
        <option value="variavel">Variável (ex.: materiais, eventuais)</option>
      </select></Field></div>}
    <Field label="Situação"><select className="input" value={f.situacao||"efetivada"} onChange={e=>set("situacao",e.target.value)}>
      <option value="efetivada">Efetivada (já recebido/pago)</option>
      <option value="aberto">Em aberto (a receber/pagar)</option></select></Field>
    <Field label="Valor (R$)"><input type="number" className="input" value={f.amount} onChange={e=>set("amount",+e.target.value)}/></Field>
  </div><div className="row" style={{justifyContent:"flex-end",gap:10,marginTop:20}}>
    <button className="btn" onClick={onClose}>Cancelar</button>
    <button className="btn btn-accent" onClick={()=>f.cat&&onSave(f)}>Salvar</button></div></>);
}

/* ============================ Aulão / L7 Day ============================ */
function Aulao({tx,checkins,canEdit}){
  const [modal,setModal]=useState(null);
  const [sel,setSel]=useState("");          // evento escolhido no seletor
  const [report,setReport]=useState(null);  // null = nada gerado ainda
  // eventos = união das etiquetas presentes em entradas e check-ins
  const cashEv = tx.filter(t=>t.type==="entrada" && t.event);
  const gymEv = checkins.filter(c=>c.event);
  const eventNames=[...new Set([...cashEv,...gymEv].map(x=>x.event))]
    .sort((a,b)=>(b||"").localeCompare(a||""));
  const blank={event:"",kind:"dinheiro",name:"",value:13.85,date:ym(today)+"-"+String(today.getDate()).padStart(2,"0")};
  const save=d=>{
    if(d.id){ // edição de um registro existente
      if(d.col==="transactions") put("transactions",d.id,{cat:`Aulão: ${d.event}${d.name?" — "+d.name:""}`,amount:+d.value,date:d.date});
      else put("checkins",d.id,{name:d.name||"Gympass",value:+d.value,date:d.date});
    } else { // novo registro
      if(d.kind==="dinheiro") add("transactions",{type:"entrada",cat:`Aulão: ${d.event}${d.name?" — "+d.name:""}`,amount:+d.value,date:d.date,event:d.event});
      else add("checkins",{name:d.name||"Gympass",value:+d.value,date:d.date,event:d.event});
    }
    setModal(null);
  };
  const removeItem=r=>{ if(window.confirm(`Excluir o registro de ${r.name} (${fmt(r.value)})?`)){ del(r.col,r.id); if(report) setReport(rep=>rep?{...rep,rows:rep.rows.filter(x=>!(x.col===r.col&&x.id===r.id))}:rep); } };
  const gerar=()=>{
    if(!sel) return;
    const cashItems=cashEv.filter(t=>t.event===sel);
    const gymItems=gymEv.filter(c=>c.event===sel);
    const rows=[...cashItems.map(t=>({id:t.id,col:"transactions",kind:"dinheiro",event:sel,date:t.date,name:(t.cat||"").replace(/^Aulão:[^—]*—?\s*/,"")||"—",forma:"dinheiro",value:t.amount})),
      ...gymItems.map(c=>({id:c.id,col:"checkins",kind:"gympass",event:sel,date:c.date,name:c.name||"Gympass",forma:"gympass",value:c.value}))]
      .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    setReport({event:sel,rows});
  };
  const csv=()=>{
    if(!report) return;
    const r=[["Data","Participante","Forma","Valor"],...report.rows.map(x=>[x.date,x.name,x.forma,x.value])];
    const blob=new Blob(["\ufeff"+r.map(l=>l.join(";")).join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`aulao_${report.event.replace(/[^\w]+/g,"_")}.csv`;a.click();
  };
  const cashSum = report? report.rows.filter(x=>x.forma==="dinheiro").reduce((a,x)=>a+x.value,0):0;
  const gymSum  = report? report.rows.filter(x=>x.forma==="gympass").reduce((a,x)=>a+x.value,0):0;
  return (<div className="grid" style={{gap:16}}>
    {canEdit&&<div className="row" style={{justifyContent:"flex-end"}}>
      <button className="btn btn-accent" onClick={()=>setModal(blank)}><I d={IC.plus} size={16}/>Registrar participação</button></div>}

    <div className="card">
      <h3 style={{marginBottom:12}}>Gerar relatório do evento</h3>
      <div className="row" style={{flexWrap:"wrap",gap:10,alignItems:"flex-end"}}>
        <Field label="Evento / Aulão">
          <select className="input" style={{minWidth:200}} value={sel} onChange={e=>{setSel(e.target.value);setReport(null);}}>
            <option value="">Selecione um evento...</option>
            {eventNames.map(ev=><option key={ev} value={ev}>{ev}</option>)}
          </select>
        </Field>
        <button className="btn btn-accent" disabled={!sel} onClick={gerar}><I d={IC.act} size={16}/>Gerar relatório</button>
        {report && <>
          <button className="btn" onClick={csv}><I d={IC.dl} size={16}/>Baixar CSV</button>
          <button className="btn" onClick={()=>window.print()}><I d={IC.print} size={16}/>Imprimir / PDF</button>
        </>}
      </div>
      {eventNames.length===0 && <p className="stat-s" style={{marginTop:10}}>Nenhum evento registrado ainda. Clique em "Registrar participação" e dê um nome ao Aulão (ex.: "L7 Day 25/06").</p>}
    </div>

    {report && <>
      <div className="grid cols-3">
        <Stat icon={IC.wallet} label="Faturamento do evento" value={fmt(cashSum+gymSum)} tone="accent"/>
        <Stat icon={IC.up} label="Dinheiro" value={fmt(cashSum)} sub={`${report.rows.filter(x=>x.forma==="dinheiro").length} pagamento(s)`}/>
        <Stat icon={IC.act} label="Gympass" value={fmt(gymSum)} sub={`${report.rows.filter(x=>x.forma==="gympass").length} check-in(s)`}/>
      </div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",fontWeight:700}} className="display">{report.event}</div>
        <div style={{overflowX:"auto"}}><table>
          <thead><tr><th>Data</th><th>Participante</th><th>Forma</th><th style={{textAlign:"right"}}>Valor</th>{canEdit&&<th style={{textAlign:"right"}}>Ações</th>}</tr></thead>
          <tbody>
            {report.rows.map(r=>(<tr key={r.col+r.id}>
              <td className="tnum" style={{color:"var(--muted)"}}>{fmtDate(r.date)}</td>
              <td>{r.name}</td>
              <td><span className="badge" style={{background:"var(--panel2)",border:"1px solid var(--border)",color:"var(--muted)"}}>{r.forma}</span></td>
              <td className="tnum" style={{textAlign:"right",color:"var(--good)",fontWeight:700}}>{fmt(r.value)}</td>
              {canEdit&&<td><div className="row no-print" style={{justifyContent:"flex-end",gap:4}}>
                <button className="icobtn" onClick={()=>setModal({id:r.id,col:r.col,kind:r.kind,event:r.event,name:r.name==="—"||r.name==="Gympass"?"":r.name,value:r.value,date:r.date})}><I d={IC.pen} size={15}/></button>
                <button className="icobtn" onClick={()=>removeItem(r)}><I d={IC.trash} size={15}/></button></div></td>}
            </tr>))}
            {report.rows.length===0 && <tr><td colSpan={canEdit?5:4} style={{textAlign:"center",color:"var(--muted)",padding:28}}>Nenhuma participação neste evento.</td></tr>}
          </tbody>
        </table></div>
      </div>
      <p className="stat-s">Estas receitas já estão somadas no mês: o dinheiro no Financeiro e os check-ins no Gympass. Aqui é só a visão consolidada do evento — nada é contado em dobro.</p>
    </>}
    {modal && <Modal title={modal.id?"Editar participação":"Registrar participação no Aulão"} onClose={()=>setModal(null)}>
      <AulaoForm initial={modal} events={eventNames} onSave={save} onClose={()=>setModal(null)}/></Modal>}
  </div>);
}
function AulaoForm({initial,events,onSave,onClose}){
  const [f,setF]=useState(initial); const set=(k,v)=>setF({...f,[k]:v});
  const [novo,setNovo]=useState(events.length===0);
  const editing=!!f.id;
  return (<><div className="grid cols-2" style={{gap:12}}>
    <div style={{gridColumn:"span 2"}}><Field label="Evento / Aulão">
      {editing
        ? <input className="input" value={f.event} disabled style={{opacity:.7}}/>
        : (!novo && events.length>0)
          ? <div className="row" style={{gap:8}}>
              <select className="input" value={f.event} onChange={e=>set("event",e.target.value)}>
                <option value="">Selecione...</option>{events.map(ev=><option key={ev} value={ev}>{ev}</option>)}
              </select>
              <button className="btn" type="button" onClick={()=>{setNovo(true);set("event","");}}>Novo</button>
            </div>
          : <input className="input" value={f.event} onChange={e=>set("event",e.target.value)} placeholder='Ex.: L7 Day 25/06'/>}
    </Field></div>
    <Field label="Forma de pagamento"><select className="input" value={f.kind} disabled={editing} style={editing?{opacity:.7}:{}} onChange={e=>set("kind",e.target.value)}>
      <option value="dinheiro">Dinheiro</option><option value="gympass">Check-in Gympass</option></select></Field>
    <Field label="Data"><input type="date" className="input" value={f.date} onChange={e=>set("date",e.target.value)}/></Field>
    <div style={{gridColumn:"span 2"}}><Field label="Nome do participante (opcional)"><input className="input" value={f.name} onChange={e=>set("name",e.target.value)}/></Field></div>
    <div style={{gridColumn:"span 2"}}><Field label="Valor (R$)"><input type="number" step="0.01" className="input" value={f.value} onChange={e=>set("value",+e.target.value)}/></Field></div>
  </div><div className="row" style={{justifyContent:"flex-end",gap:10,marginTop:20}}>
    <button className="btn" onClick={onClose}>Cancelar</button>
    <button className="btn btn-accent" onClick={()=>f.event&&onSave(f)}>Salvar</button></div></>);
}

/* ============================ Login ============================ */
function Login(){
  const [e,setE]=useState(""),[p,setP]=useState(""),[err,setErr]=useState("");
  const go=()=>{setErr("");auth.signInWithEmailAndPassword(e.trim(),p).catch(()=>setErr("E-mail ou senha inválidos."));};
  return (<div className="center">
    <div style={{width:"100%",maxWidth:360}}>
      <div className="brand"><Logo size={44}/>
        <div><div style={{fontWeight:800}} className="display">Team L7</div><div className="stat-s">Gestão Financeira</div></div></div>
      <div className="card"><div className="grid" style={{gap:14}}>
        <Field label="E-mail"><input className="input" value={e} onChange={x=>setE(x.target.value)} onKeyDown={x=>x.key==="Enter"&&go()}/></Field>
        <Field label="Senha"><input type="password" className="input" value={p} onChange={x=>setP(x.target.value)} onKeyDown={x=>x.key==="Enter"&&go()}/></Field>
        {err&&<div style={{color:"var(--bad)",fontSize:13}}>{err}</div>}
        <button className="btn btn-accent" style={{justifyContent:"center"}} onClick={go}>Entrar</button>
      </div></div>
      <p className="stat-s" style={{textAlign:"center",marginTop:14}}>Acesso criado pelo administrador no Firebase.</p>
    </div>
  </div>);
}

/* ============================ App ============================ */
const NAV=[["dashboard","Dashboard",IC.dash],["alunos","Alunos",IC.users],
  ["planos","Planos",IC.tag],["gympass","Gympass",IC.act],["aulao","Eventos L7",IC.up],["financeiro","Financeiro",IC.wallet]];

function Shell({user,role}){
  const [view,setView]=useState("dashboard");
  const students=useCol("students"), plans=useCol("plans"), gympass=useCol("gympass"), tx=useCol("transactions"), checkins=useCol("checkins");
  const canEdit = role==="admin";
  const title = NAV.find(n=>n[0]===view)[1];
  return (<div className="app">
    <aside className="side">
      <div className="brand"><Logo size={40}/>
        <div><div className="display" style={{fontWeight:800}}>Team L7</div><div className="stat-s">Gestão Financeira</div></div></div>
      <nav className="nav">{NAV.map(([id,label,ic])=>(
        <button key={id} className={"navbtn"+(view===id?" active":"")} onClick={()=>setView(id)}><I d={ic}/>{label}</button>))}</nav>
      <div style={{borderTop:"1px solid var(--border)",paddingTop:14}}>
        <div className="row" style={{padding:"0 6px 12px",fontSize:12}}>
          <span style={{color:"var(--accent)"}}><I d={IC.shield} size={14}/></span>
          <div><div style={{fontWeight:600}}>{user.email}</div><div style={{color:"var(--muted)",textTransform:"capitalize"}}>{role}</div></div></div>
        <button className="navbtn" onClick={()=>auth.signOut()}><I d={IC.out} size={16}/>Sair</button>
      </div>
    </aside>
    <main className="main">
      <div className="topnav">{NAV.map(([id,label,ic])=>(
        <button key={id} className={"navbtn"+(view===id?" active":"")} style={{width:"auto",whiteSpace:"nowrap"}} onClick={()=>setView(id)}><I d={ic} size={15}/>{label}</button>))}</div>
      <div className="wrap">
        <div className="head"><div><h1>{title}</h1>
          <p>{!canEdit&&"Modo visualização (colaborador) · "}{today.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p></div>
          <button className="btn no-print" onClick={()=>auth.signOut()} style={{display:"none"}}></button></div>
        {view==="dashboard"&&<Dashboard students={students} plans={plans} gympass={gympass} checkins={checkins} tx={tx}/>}
        {view==="alunos"&&<Alunos students={students} plans={plans} tx={tx} canEdit={canEdit}/>}
        {view==="planos"&&<Planos plans={plans} students={students} canEdit={canEdit}/>}
        {view==="gympass"&&<Gympass gympass={gympass} checkins={checkins} canEdit={canEdit}/>}
        {view==="aulao"&&<Aulao tx={tx} checkins={checkins} canEdit={canEdit}/>}
        {view==="financeiro"&&<Financeiro tx={tx} canEdit={canEdit}/>}
      </div>
    </main>
  </div>);
}

function App(){
  const [state,setState]=useState({loading:true,user:null,role:null});
  useEffect(()=>auth.onAuthStateChanged(async u=>{
    if(!u){setState({loading:false,user:null,role:null});return;}
    let role="colaborador";
    try{const doc=await db.collection("users").doc(u.uid).get(); if(doc.exists&&doc.data().role) role=doc.data().role;}catch(e){console.error(e);}
    setState({loading:false,user:u,role});
  }),[]);
  if(state.loading) return <div className="center" style={{color:"var(--muted)"}}>Carregando…</div>;
  if(!state.user) return <Login/>;
  return <Shell user={state.user} role={state.role}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
try{ document.getElementById("favicon").href = LOGO; }catch(e){}
</script>
