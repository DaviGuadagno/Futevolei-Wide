<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Wide Futevôlei · Gestão Financeira</title>
<link id="favicon" rel="icon" type="image/jpeg" />

<!-- Firebase (compat: expõe o global `firebase`, ideal sem build) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<!-- React + Babel (sem build) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Manrope:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#131311; --panel:#1A1A18; --panel2:#171715; --border:#2e2e2a;
  --txt:#FFFFFF; --muted:#a0a09a; --accent:#1772B8; --accent2:#1f86d4;
  --good:#34d399; --bad:#ff6b7d; --info:#9aa0aa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--txt);font-family:'Manrope',system-ui,sans-serif}
h1,h2,h3,.display{font-family:'Bricolage Grotesque',system-ui,sans-serif}
.tnum{font-variant-numeric:tabular-nums}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:#3a3a35;border-radius:8px}
.app{display:flex;min-height:100vh}
.side{width:240px;flex-shrink:0;background:var(--panel2);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:12px;padding:6px;margin-bottom:24px}
.logo{width:40px;height:40px;border-radius:12px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center}
.nav{flex:1;display:flex;flex-direction:column;gap:4px}
.navbtn{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;border:none;background:none;color:var(--muted);font:inherit;font-weight:600;font-size:14px;cursor:pointer;text-align:left;width:100%}
.navbtn:hover{background:#242420;color:var(--txt)}
.navbtn.active{background:var(--accent);color:#fff}
.main{flex:1;overflow-x:hidden}
.wrap{padding:28px}
.head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:8px}
.head h1{font-size:26px;font-weight:800}
.head p{color:var(--muted);font-size:13px;margin-top:2px}
.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:18px}
.stat-l{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.stat-v{font-size:24px;font-weight:800;margin-top:8px}
.stat-s{font-size:12px;color:var(--muted);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--txt);font:inherit;font-weight:600;font-size:14px;cursor:pointer}
.btn:hover{background:#242420}
.btn-accent{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-accent:hover{background:var(--accent2)}
.input,select.input{width:100%;padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:#121210;color:var(--txt);font:inherit;font-size:14px;outline:none}
.input:focus{border-color:var(--accent)}
.lbl{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block}
table{width:100%;border-collapse:collapse;font-size:14px}
thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:12px 14px;background:var(--panel2)}
tbody td{padding:12px 14px;border-top:1px solid var(--border)}
tbody tr:hover{background:#201f1c}
.badge{padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;text-transform:capitalize}
.b-ativo{background:rgba(52,211,153,.15);color:var(--good)}
.b-inadimplente{background:rgba(251,113,133,.15);color:var(--bad)}
.b-cancelado{background:rgba(148,163,184,.18);color:var(--muted)}
.b-emdia{background:rgba(52,211,153,.15);color:var(--good)}
.b-aberto{background:rgba(245,200,66,.16);color:#f5c842}
.b-entrada{background:rgba(52,211,153,.15);color:var(--good)}
.b-saida{background:rgba(251,113,133,.15);color:var(--bad)}
.icobtn{padding:6px;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer}
.icobtn:hover{background:#2a2a26;color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;padding:16px;z-index:50}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:22px;width:100%;max-width:480px}
.legend{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);justify-content:space-between;margin-top:4px}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.row{display:flex;align-items:center;gap:8px}
.topnav{display:none;gap:6px;overflow-x:auto;padding:10px;border-bottom:1px solid var(--border)}
.center{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
@media(max-width:880px){
  .side{display:none}.topnav{display:flex}.wrap{padding:16px}
  .cols-4{grid-template-columns:repeat(2,1fr)}.cols-3{grid-template-columns:1fr}
  .cols-2{grid-template-columns:1fr}.head h1{font-size:22px}
}
@media print{.side,.topnav,.btn,.icobtn,.no-print{display:none!important}.main{overflow:visible}}
</style>
</head>

/* Hook: coleção Firestore em tempo real */
function useCol(name){
  const [rows,setRows] = useState([]);
  useEffect(()=>{
    const unsub = db.collection(name).onSnapshot(
      snap => setRows(snap.docs.map(d=>({id:d.id,...d.data()}))),
      err => console.error(name,err)
    );
    return unsub;
  },[name]);
  return rows;
}

const put = (c,id,data)=>db.collection(c).doc(id).set(data,{merge:true});
const del = (c,id)=>db.collection(c).doc(id).delete();

/* ============================ Gráficos SVG ============================ */
function Donut({data}){
  const total = data.reduce((a,d)=>a+d.value,0)||1;
  let acc=0; const R=54,C=2*Math.PI*R;
  return (<svg viewBox="0 0 140 140" width="100%" height="180">
    <g transform="translate(70,70) rotate(-90)">
      {data.map((d,i)=>{ const len=d.value/total*C; const seg=(<circle key={i} r={R} fill="none"
        stroke={d.color} strokeWidth="18" strokeDasharray={`${len} ${C-len}`} strokeDashoffset={-acc}/>);
        acc+=len; return seg; })}
    </g>
  </svg>);
}
function Bars({data,height=210}){
  const max = Math.max(...data.map(d=>d.value),1); const W=Math.max(data.length*70,140);
  return (<svg viewBox={`0 0 ${W} ${height}`} width="100%" height={height} preserveAspectRatio="none">
    {data.map((d,i)=>{ const h=(d.value/max)*(height-40); const x=i*(W/data.length)+ (W/data.length)*0.25; const w=(W/data.length)*0.5;
      return (<g key={i}>
        <rect x={x} y={height-30-h} width={w} height={h} rx="6" fill={d.color}/>
        <text x={x+w/2} y={height-12} fill="var(--muted)" fontSize="11" textAnchor="middle" fontFamily="Manrope">{d.label}</text>
        <text x={x+w/2} y={height-36-h} fill="var(--txt)" fontSize="12" textAnchor="middle" fontFamily="Manrope" fontWeight="700">{d.value}</text>
      </g>); })}
  </svg>);
}
function Lines({series,labels,height=240}){
  const all = series.flatMap(s=>s.points); const max=Math.max(...all,1), min=Math.min(...all,0);
  const W=560,H=height,pad=36; const n=labels.length;
  const X=i=> pad + i*((W-pad*2)/Math.max(n-1,1));
  const Y=v=> H-30 - ((v-min)/((max-min)||1))*(H-60);
  return (<svg viewBox={`0 0 ${W} ${H}`} width="100%" height={height}>
    {[0,.5,1].map((t,i)=>{const y=30+t*(H-60);return <line key={i} x1={pad} x2={W-pad} y1={y} y2={y} stroke="var(--border)"/>;})}
    {series.map((s,si)=>(<polyline key={si} fill="none" stroke={s.color} strokeWidth="2.5"
      points={s.points.map((v,i)=>`${X(i)},${Y(v)}`).join(" ")}/>))}
    {labels.map((l,i)=>(<text key={i} x={X(i)} y={H-8} fill="var(--muted)" fontSize="11" textAnchor="middle" fontFamily="Manrope">{l}</text>))}
  </svg>);
}

/* ============================ Páginas ============================ */
function Dashboard({students,plans,tx}){
  const [mes,setMes]=useState(ym(today));
  const planById=id=>plans.find(p=>p.id===id);
  const active=students.filter(s=>payStatus(s)!=="cancelado");
  const inad=students.filter(s=>payStatus(s)==="inadimplente");
  const aberto=students.filter(s=>payStatus(s)==="em aberto");
  const mrr=active.reduce((a,s)=>a+(planById(s.planId)?.price||0),0);
  const inadV=inad.reduce((a,s)=>a+(planById(s.planId)?.price||0),0);
  const caixa=tx.filter(t=>t.type==="entrada"&&(t.date||"").startsWith(mes)).reduce((a,t)=>a+t.amount,0);
  const byPlan=plans.map((p,i)=>({label:p.name,value:active.filter(s=>s.planId===p.id).length,
    receita:active.filter(s=>s.planId===p.id).length*p.price,color:PALETTE[i%5]}));
  const periods=useMemo(()=>{const s=new Set(tx.map(t=>(t.date||"").slice(0,7)).filter(Boolean));s.add(ym(today));return[...s].sort().reverse();},[tx]);
  const mesLabel=(m)=>{const[y,mo]=m.split("-");return `${MS[+mo-1]}/${y}`;};

  const monthly=useMemo(()=>{const m={};tx.forEach(t=>{const k=(t.date||"").slice(0,7);if(!k)return;if(t.type!=="entrada")return;m[k]=(m[k]||0)+t.amount;});
    const ks=Object.keys(m).sort();return ks.map(k=>({mes:MS[+k.split("-")[1]-1],e:m[k]}));},[tx]);
  const grow=monthly.length>=2&&monthly.at(-2).e? ((monthly.at(-1).e-monthly.at(-2).e)/monthly.at(-2).e*100):0;

  return (<div className="grid" style={{gap:16}}>
    <div className="row" style={{justifyContent:"flex-end"}}>
      <select className="input" style={{width:"auto"}} value={mes} onChange={e=>setMes(e.target.value)}>
        {periods.map(p=><option key={p} value={p}>{mesLabel(p)}</option>)}
      </select>
    </div>
    <div className="grid cols-4">
      <Stat icon={IC.users} label="Alunos ativos" value={active.length} sub={`${students.length} cadastrados`}/>
      <Stat icon={IC.wallet} label="Receita recorrente" value={fmt(mrr)} sub="Mensalidades ativas" tone="accent"/>
      <Stat icon={IC.wallet} label="Caixa" value={fmt(caixa)} sub={`Entradas em ${mesLabel(mes)}`} tone="good"/>
      <Stat icon={IC.warn} label="Inadimplência" value={fmt(inadV)} sub={`${inad.length} em atraso · ${aberto.length} em aberto`} tone="bad"/>
    </div>
    <div className="grid cols-2">
      <div className="card">
        <div className="row" style={{justifyContent:"space-between",marginBottom:6}}>
          <h3>Receita mensal</h3>
          <span style={{fontSize:12,color:grow>=0?"var(--good)":"var(--bad)"}} className="row">
            <I d={grow>=0?IC.up:IC.down} size={14}/>{grow.toFixed(1)}%</span>
        </div>
        <Lines labels={monthly.map(m=>m.mes)} series={[
          {points:monthly.map(m=>m.e),color:"var(--accent)"}]}/>
        <div className="row" style={{gap:16,marginTop:8,fontSize:12,color:"var(--muted)"}}>
          <span className="row"><span className="dot" style={{background:"var(--accent)"}}/>Receita</span>
        </div>
      </div>
      <div className="card">
        <h3 style={{marginBottom:6}}>Receita por plano</h3>
        <Donut data={byPlan.map(b=>({value:b.receita,color:b.color}))}/>
        <div style={{marginTop:8}}>
          {byPlan.map((b,i)=>(<div key={i} className="legend">
            <span className="row"><span className="dot" style={{background:b.color}}/>{b.label}</span>
            <span className="tnum" style={{color:"var(--txt)"}}>{fmt(b.receita)} · {b.value}</span>
          </div>))}
        </div>
      </div>
    </div>
    <div className="grid cols-2">
      <div className="card"><h3 style={{marginBottom:6}}>Alunos por plano</h3><Bars data={byPlan}/></div>
      <div className="card">
        <h3>Resumo do mês</h3><p className="stat-s" style={{marginBottom:12}}>{mesLabel(mes)}</p>
        {[["Receita recorrente estimada",fmt(mrr),"var(--accent)"],
          ["Caixa do mês",fmt(caixa),"var(--good)"],
          ["Ticket médio (ativos)",fmt(active.length?mrr/active.length:0),"var(--txt)"]
        ].map(([k,v,c],i)=>(<div key={i} className="row" style={{justifyContent:"space-between",borderBottom:"1px solid var(--border)",padding:"9px 0"}}>
          <span style={{color:"var(--muted)",fontSize:14}}>{k}</span>
          <span className="tnum" style={{fontWeight:700,color:c}}>{v}</span></div>))}
      </div>
    </div>
  </div>);
}

function Alunos({students,plans,tx,canEdit}){
  const [modal,setModal]=useState(null),[q,setQ]=useState(""),[f,setF]=useState("todos");
  const [payModal,setPayModal]=useState(null);
  const planName=id=>plans.find(p=>p.id===id)?.name||"—";
  const planPrice=id=>plans.find(p=>p.id===id)?.price||0;
  const blank={name:"",phone:"",email:"",planId:plans[0]?.id||"",dueStart:1,dueEnd:7,status:"ativo",freq:0};
  const list=students.filter(s=>(f==="todos"||payStatus(s)===f)&&s.name.toLowerCase().includes(q.toLowerCase()));
  const onSave=st=>{const{id,...d}=st; (id?put("students",id,d):add("students",d)); setModal(null);};
  const mref=(s,mesRef)=>`mens_${s.id}_${mesRef}`;
  const confirmarPago=(s,valor,data)=>{
    const mesRef=data.slice(0,7);
    const ref=mref(s,mesRef);
    // remove qualquer lançamento anterior com a mesma referência (evita duplicar)
    tx.filter(t=>t.mref===ref).forEach(t=>del("transactions",t.id));
    add("transactions",{type:"entrada",cat:`Mensalidade — ${s.name}`,amount:+valor,date:data,mref:ref});
    put("students",s.id,{lastPaid:mesRef});
    setPayModal(null);
  };
  const desfazer=s=>{
    const ref=mref(s,ym(today));
    tx.filter(t=>t.mref===ref).forEach(t=>del("transactions",t.id));
    put("students",s.id,{lastPaid:""});
  };
  return (<div className="grid" style={{gap:14}}>
    <div className="row" style={{flexWrap:"wrap",gap:10}}>
      <div style={{position:"relative",flex:1,minWidth:200}}>
        <span style={{position:"absolute",left:10,top:9,color:"var(--muted)"}}><I d={IC.search} size={16}/></span>
        <input className="input" style={{paddingLeft:34}} placeholder="Buscar aluno..." value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <select className="input" style={{width:"auto"}} value={f} onChange={e=>setF(e.target.value)}>
        <option value="todos">Todos</option><option value="em dia">Em dia</option>
        <option value="em aberto">Em aberto</option><option value="inadimplente">Inadimplentes</option>
        <option value="cancelado">Cancelados</option>
      </select>
      {canEdit && <button className="btn btn-accent" onClick={()=>setModal(blank)}><I d={IC.plus} size={16}/>Novo aluno</button>}
    </div>
    <div className="card" style={{padding:0,overflow:"hidden"}}>
      <div style={{overflowX:"auto"}}><table>
        <thead><tr><th>Nome</th><th>Plano</th><th>Vencimento</th><th>Freq.</th><th>Status</th>{canEdit&&<th style={{textAlign:"right"}}>Ações</th>}</tr></thead>
        <tbody>
          {list.map(s=>(<tr key={s.id}>
            <td><div style={{fontWeight:600}}>{s.name}</div><div className="stat-s">{s.email} · {s.phone}</div></td>
            <td style={{color:"var(--muted)"}}>{planName(s.planId)}</td>
            <td style={{color:"var(--muted)"}}>{dueText(s)}</td>
            <td className="tnum" style={{color:"var(--muted)"}}>{s.freq}</td>
            <td><PayBadge s={s}/></td>
            {canEdit&&<td><div className="row" style={{justifyContent:"flex-end",gap:6}}>
              {payStatus(s)!=="cancelado" && (payStatus(s)==="em dia"
                ? <button className="btn" style={{padding:"4px 9px",fontSize:12}} onClick={()=>desfazer(s)}>Desfazer</button>
                : <button className="btn btn-accent" style={{padding:"4px 9px",fontSize:12}} onClick={()=>setPayModal({s,valor:planPrice(s.planId),data:ym(today)+"-"+String(today.getDate()).padStart(2,"0")})}>Marcar pago</button>)}
              <button className="icobtn" onClick={()=>setModal(s)}><I d={IC.pen} size={15}/></button>
              <button className="icobtn" onClick={()=>del("students",s.id)}><I d={IC.trash} size={15}/></button>
            </div></td>}
          </tr>))}
          {list.length===0&&<tr><td colSpan={6} style={{textAlign:"center",color:"var(--muted)",padding:32}}>Nenhum aluno encontrado.</td></tr>}
        </tbody>
      </table></div>
    </div>
    {modal && <StudentForm initial={modal} plans={plans} onClose={()=>setModal(null)} onSave={onSave}/>}
    {payModal && <Modal title={`Marcar mensalidade — ${payModal.s.name}`} onClose={()=>setPayModal(null)}>
      <PagamentoForm initial={payModal} onConfirm={confirmarPago} onClose={()=>setPayModal(null)}/></Modal>}
  </div>);
}

function Planos({plans,students,canEdit}){
  const [edit,setEdit]=useState(null);
  const count=id=>students.filter(s=>s.planId===id&&s.status==="ativo").length;
  const seedPlans=()=>{[
    {name:"Beach Start",price:120,classes:"8 aulas/mês",benefits:"2x por semana · horário fixo"},
    {name:"Beach Pro",price:180,classes:"12 aulas/mês",benefits:"3x por semana · horários flexíveis"},
    {name:"Beach Elite",price:250,classes:"Ilimitado",benefits:"Acesso prioritário · avaliação física"}
  ].forEach(p=>add("plans",p));};
  const blankPlan={name:"",price:0,classes:"",benefits:""};
  const savePlan=p=>{const{id,...d}=p; (id?put("plans",id,d):add("plans",d)); setEdit(null);};
  const delPlan=p=>{
    const vinculados=students.filter(s=>s.planId===p.id);
    if(vinculados.length>0){
      window.alert(`Não é possível excluir o plano "${p.name}": ${vinculados.length} aluno(s) ainda estão vinculados a ele. Mova esses alunos para outro plano antes de excluir.`);
      return;
    }
    if(window.confirm(`Excluir o plano "${p.name}"? Esta ação não pode ser desfeita.`)) del("plans",p.id);
  };
  if(plans.length===0) return (<div className="card" style={{textAlign:"center",padding:40}}>
    <p style={{color:"var(--muted)",marginBottom:16}}>Nenhum plano cadastrado ainda.</p>
    {canEdit?<div className="row" style={{justifyContent:"center",gap:10}}>
        <button className="btn btn-accent" onClick={seedPlans}><I d={IC.plus} size={16}/>Criar 3 planos padrão</button>
        <button className="btn" onClick={()=>setEdit(blankPlan)}>Criar plano do zero</button></div>
      :<p className="stat-s">Peça ao administrador para criar os planos.</p>}
    {edit && <PlanForm initial={edit} onClose={()=>setEdit(null)} onSave={savePlan}/>}
  </div>);
  return (<div className="grid" style={{gap:16}}>
    {canEdit && <div className="row" style={{justifyContent:"flex-end"}}>
      <button className="btn btn-accent" onClick={()=>setEdit(blankPlan)}><I d={IC.plus} size={16}/>Novo plano</button></div>}
    <div className="grid cols-3">
    {plans.map((p,i)=>(<div key={p.id} className="card" style={{display:"flex",flexDirection:"column"}}>
      <div className="row" style={{justifyContent:"space-between"}}>
        <span className="badge" style={{background:PALETTE[i%5]+"22",color:PALETTE[i%5]}}>Plano {i+1}</span>
        {canEdit&&<div className="row" style={{gap:2}}>
          <button className="icobtn" onClick={()=>setEdit(p)}><I d={IC.pen} size={15}/></button>
          <button className="icobtn" onClick={()=>delPlan(p)}><I d={IC.trash} size={15}/></button>
        </div>}
      </div>
      <h3 style={{fontSize:20,marginTop:8}}>{p.name}</h3>
      <div className="tnum" style={{fontSize:30,fontWeight:800,color:PALETTE[i%5],marginTop:4}}>{fmt(p.price)}<span style={{fontSize:13,fontWeight:400,color:"var(--muted)"}}>/mês</span></div>
      <div style={{marginTop:12,fontSize:14}}><div className="row" style={{color:"var(--muted)"}}><I d={IC.tag} size={14}/>{p.classes}</div>
        <div style={{color:"var(--muted)",marginTop:6}}>{p.benefits}</div></div>
      <div style={{marginTop:"auto",borderTop:"1px solid var(--border)",paddingTop:14,fontSize:14}}>
        <span style={{color:"var(--muted)"}}>{count(p.id)} ativos · </span>
        <span style={{color:"var(--good)",fontWeight:700}}>{fmt(count(p.id)*p.price)}/mês</span></div>
    </div>))}
    </div>
    {edit && <PlanForm initial={edit} onClose={()=>setEdit(null)} onSave={savePlan}/>}
  </div>);
}
function PlanForm({initial,onClose,onSave}){
  const [f,setF]=useState(initial); const set=(k,v)=>setF({...f,[k]:v});

function Financeiro({tx,canEdit}){
  const [modal,setModal]=useState(null),[per,setPer]=useState("todos");
  const blank={type:"entrada",cat:"",amount:0,recur:"variavel",date:ym(today)+"-"+String(today.getDate()).padStart(2,"0")};
  const periods=useMemo(()=>[...new Set(tx.map(t=>(t.date||"").slice(0,7)).filter(Boolean))].sort().reverse(),[tx]);
  const list=tx.filter(t=>per==="todos"||(t.date||"").startsWith(per)).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const ent=list.filter(t=>t.type==="entrada").reduce((a,t)=>a+t.amount,0);
  const sai=list.filter(t=>t.type==="saida").reduce((a,t)=>a+t.amount,0);
  const saiFixo=list.filter(t=>t.type==="saida"&&t.recur==="fixo").reduce((a,t)=>a+t.amount,0);
  const saiVar=sai-saiFixo;
  const onSave=t=>{const{id,...d}=t;(id?put("transactions",id,d):add("transactions",d));setModal(null);};
  const csv=()=>{const rows=[["Data","Tipo","Categoria","Recorrência","Valor"],...list.map(t=>[t.date,t.type,t.cat,t.type==="saida"?(t.recur||""):"",t.amount])];
    const blob=new Blob(["\ufeff"+rows.map(r=>r.join(";")).join("\n")],{type:"text/csv;charset=utf-8;"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`financeiro_${per}.csv`;a.click();};
  return (<div className="grid" style={{gap:14}}>
    <div className="grid cols-3">
      <Stat icon={IC.up} label="Entradas" value={fmt(ent)} tone="good"/>
      <Stat icon={IC.down} label="Saídas" value={fmt(sai)} sub={`Fixas ${fmt(saiFixo)} · Variáveis ${fmt(saiVar)}`} tone="bad"/>
      <Stat icon={IC.wallet} label="Fluxo de caixa" value={fmt(ent-sai)} tone={ent-sai>=0?"accent":"bad"}/>
    </div>
    <div className="row" style={{flexWrap:"wrap",gap:10}}>
      <select className="input" style={{width:"auto"}} value={per} onChange={e=>setPer(e.target.value)}>
        <option value="todos">Todos os períodos</option>
        {periods.map(p=>{const[y,m]=p.split("-");return <option key={p} value={p}>{MS[+m-1]}/{y}</option>;})}
      </select>
      <button className="btn" onClick={csv}><I d={IC.dl} size={16}/>Exportar CSV</button>
      <button className="btn" onClick={()=>window.print()}><I d={IC.print} size={16}/>PDF / Imprimir</button>
      {canEdit&&<button className="btn btn-accent" style={{marginLeft:"auto"}} onClick={()=>setModal(blank)}><I d={IC.plus} size={16}/>Lançamento</button>}
    </div>
    <div className="card" style={{padding:0,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table>
      <thead><tr><th>Data</th><th>Categoria</th><th>Tipo</th><th style={{textAlign:"right"}}>Valor</th>{canEdit&&<th style={{textAlign:"right"}}>Ações</th>}</tr></thead>
      <tbody>{list.map(t=>(<tr key={t.id}>
        <td className="tnum" style={{color:"var(--muted)"}}>{fmtDate(t.date)}</td>
        <td style={{fontWeight:600}}>{t.cat}{t.type==="saida"&&t.recur&&<span className="badge" style={{marginLeft:8,fontSize:10,background:"var(--panel2)",color:"var(--muted)",border:"1px solid var(--border)"}}>{t.recur}</span>}</td>
        <td><Badge v={t.type}/></td>
        <td className="tnum" style={{textAlign:"right",fontWeight:700,color:t.type==="entrada"?"var(--good)":"var(--bad)"}}>{t.type==="entrada"?"+ ":"− "}{fmt(t.amount)}</td>
        {canEdit&&<td><div className="row" style={{justifyContent:"flex-end",gap:4}}>
          <button className="icobtn" onClick={()=>setModal(t)}><I d={IC.pen} size={15}/></button>
          <button className="icobtn" onClick={()=>del("transactions",t.id)}><I d={IC.trash} size={15}/></button></div></td>}
      </tr>))}</tbody></table></div></div>
    {modal&&<Modal title={modal.id?"Editar lançamento":"Novo lançamento"} onClose={()=>setModal(null)}>
      <TForm initial={modal} onSave={onSave} onClose={()=>setModal(null)}/></Modal>}
  </div>);
}
function TForm({initial,onSave,onClose}){
  const [f,setF]=useState(initial); const set=(k,v)=>setF({...f,[k]:v});
  return (<><div className="grid cols-2" style={{gap:12}}>
    <Field label="Tipo"><select className="input" value={f.type} onChange={e=>set("type",e.target.value)}>

    {f.type==="saida" && <div style={{gridColumn:"span 2"}}><Field label="Tipo de despesa">
      <select className="input" value={f.recur||"variavel"} onChange={e=>set("recur",e.target.value)}>
        <option value="fixo">Fixa (ex.: salários, aluguel)</option>
        <option value="variavel">Variável (ex.: materiais, eventuais)</option>
      </select></Field></div>}
    <div style={{gridColumn:"span 2"}}><Field label="Valor (R$)"><input type="number" className="input" value={f.amount} onChange={e=>set("amount",+e.target.value)}/></Field></div>

    <button className="btn" onClick={onClose}>Cancelar</button>
    <button className="btn btn-accent" onClick={()=>f.cat&&onSave(f)}>Salvar</button></div></>);
}

        <div><div style={{fontWeight:800}} className="display">Wide Futevôlei</div><div className="stat-s">Gestão Financeira</div></div></div>
      <div className="card"><div className="grid" style={{gap:14}}>
        <Field label="E-mail"><input className="input" value={e} onChange={x=>setE(x.target.value)} onKeyDown={x=>x.key==="Enter"&&go()}/></Field>
        <Field label="Senha"><input type="password" className="input" value={p} onChange={x=>setP(x.target.value)} onKeyDown={x=>x.key==="Enter"&&go()}/></Field>
        {err&&<div style={{color:"var(--bad)",fontSize:13}}>{err}</div>}
        <button className="btn btn-accent" style={{justifyContent:"center"}} onClick={go}>Entrar</button>
      </div></div>
      <p className="stat-s" style={{textAlign:"center",marginTop:14}}>Acesso criado pelo administrador no Firebase.</p>
    </div>
  </div>);
}

/* ============================ App ============================ */
const NAV=[["dashboard","Dashboard",IC.dash],["alunos","Alunos",IC.users],
  ["planos","Planos",IC.tag],["financeiro","Financeiro",IC.wallet]];

function Shell({user,role}){
  const [view,setView]=useState("dashboard");
  const students=useCol("students"), plans=useCol("plans"), tx=useCol("transactions");
  const canEdit = role==="admin";
  const title = NAV.find(n=>n[0]===view)[1];
  return (<div className="app">
    <aside className="side">
      <div className="brand"><Logo size={40}/>
        <div><div className="display" style={{fontWeight:800}}>Wide Futevôlei</div><div className="stat-s">Gestão Financeira</div></div></div>
      <nav className="nav">{NAV.map(([id,label,ic])=>(
        <button key={id} className={"navbtn"+(view===id?" active":"")} onClick={()=>setView(id)}><I d={ic}/>{label}</button>))}</nav>
      <div style={{borderTop:"1px solid var(--border)",paddingTop:14}}>
        <div className="row" style={{padding:"0 6px 12px",fontSize:12}}>
          <span style={{color:"var(--accent)"}}><I d={IC.shield} size={14}/></span>
          <div><div style={{fontWeight:600}}>{user.email}</div><div style={{color:"var(--muted)",textTransform:"capitalize"}}>{role}</div></div></div>
        <button className="navbtn" onClick={()=>auth.signOut()}><I d={IC.out} size={16}/>Sair</button>
      </div>
    </aside>
    <main className="main">
      <div className="topnav">{NAV.map(([id,label,ic])=>(
        <button key={id} className={"navbtn"+(view===id?" active":"")} style={{width:"auto",whiteSpace:"nowrap"}} onClick={()=>setView(id)}><I d={ic} size={15}/>{label}</button>))}</div>
      <div className="wrap">
        <div className="head"><div><h1>{title}</h1>
          <p>{!canEdit&&"Modo visualização (colaborador) · "}{today.toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</p></div>
          <button className="btn no-print" onClick={()=>auth.signOut()} style={{display:"none"}}></button></div>
        {view==="dashboard"&&<Dashboard students={students} plans={plans} tx={tx}/>}
        {view==="alunos"&&<Alunos students={students} plans={plans} tx={tx} canEdit={canEdit}/>}
        {view==="planos"&&<Planos plans={plans} students={students} canEdit={canEdit}/>}
        {view==="financeiro"&&<Financeiro tx={tx} canEdit={canEdit}/>}
      </div>
    </main>
  </div>);
}

function App(){
  const [state,setState]=useState({loading:true,user:null,role:null});
  useEffect(()=>auth.onAuthStateChanged(async u=>{
    if(!u){setState({loading:false,user:null,role:null});return;}
    let role="colaborador";
    try{const doc=await db.collection("users").doc(u.uid).get(); if(doc.exists&&doc.data().role) role=doc.data().role;}catch(e){console.error(e);}
    setState({loading:false,user:u,role});
  }),[]);
  if(state.loading) return <div className="center" style={{color:"var(--muted)"}}>Carregando…</div>;
  if(!state.user) return <Login/>;
  return <Shell user={state.user} role={state.role}/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
try{ document.getElementById("favicon").href = LOGO; }catch(e){}
</script>
</body>
</html>
